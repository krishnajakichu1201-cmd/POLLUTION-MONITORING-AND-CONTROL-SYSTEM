<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kerala Pollution Monitoring Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="data.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:#09090b;color:#fafafa;min-height:100vh}
        .container{max-width:1320px;margin:0 auto;padding:48px 24px}
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:48px;flex-wrap:wrap;gap:20px}
        .title{font-size:2.25rem;font-weight:800;letter-spacing:-0.03em}
        .title span{background:linear-gradient(135deg,#3b82f6,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .subtitle{color:#52525b;font-size:0.875rem;font-weight:500;margin-top:4px}
        .controls{display:flex;gap:12px;align-items:center}
        .pill{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:10px 18px;display:flex;align-items:center;gap:10px;font-weight:700;font-size:0.875rem}
        select{background:transparent;border:none;color:#fafafa;font-family:'Inter',sans-serif;font-weight:600;font-size:0.875rem;cursor:pointer;outline:none}
        select option{background:#18181b;color:#fafafa}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;margin-bottom:32px}
        .stat-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:20px;padding:24px;transition:all 0.35s cubic-bezier(0.4,0,0.2,1)}
        .stat-card:hover{border-color:rgba(255,255,255,0.15);transform:translateY(-2px);box-shadow:0 25px 50px -12px rgba(0,0,0,0.5)}
        .stat-label{color:#71717a;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px}
        .stat-value{font-size:2rem;font-weight:800;line-height:1}
        .stat-trend{font-size:0.75rem;margin-top:8px;font-weight:600}
        .stat-trend.down{color:#34d399}
        .stat-trend.up{color:#f87171}
        .stat-top{display:flex;justify-content:space-between;align-items:flex-start}
        .stat-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.25rem}
        .charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:20px;margin-bottom:32px}
        .chart-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:20px;padding:28px}
        .chart-card:hover{border-color:rgba(255,255,255,0.15)}
        .chart-title{display:flex;align-items:center;gap:10px;margin-bottom:24px;font-size:1.1rem;font-weight:700}
        .chart-wrap{position:relative;height:320px}
        .table-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:20px;padding:28px;overflow:hidden}
        table{width:100%;border-collapse:collapse;text-align:left}
        thead th{padding:12px 16px;color:#52525b;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;border-bottom:1px solid rgba(255,255,255,0.06)}
        tbody td{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.04);font-size:0.875rem}
        tbody tr:hover{background:rgba(255,255,255,0.03)}
        .tag{padding:4px 12px;border-radius:9999px;font-size:11px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;display:inline-block}
        .tag-bad{background:rgba(239,68,68,0.12);color:#f87171;border:1px solid rgba(239,68,68,0.2)}
        .tag-moderate{background:rgba(245,158,11,0.12);color:#fbbf24;border:1px solid rgba(245,158,11,0.2)}
        .tag-good{background:rgba(16,185,129,0.12);color:#34d399;border:1px solid rgba(16,185,129,0.2)}
        .mono{font-family:'Courier New',monospace;font-weight:600}
        .text-green{color:#34d399}
        .bold{font-weight:700}
        footer{margin-top:64px;text-align:center;padding-bottom:32px;color:#3f3f46;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.15em}
        @keyframes fadeIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
        .animate{animation:fadeIn 0.6s ease-out forwards}
        ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
    </style>
</head>
<body>
<div class="container">
    <div class="header animate">
        <div>
            <h1 class="title"><span>Kerala</span> Pollution Monitor</h1>
            <p class="subtitle">Environmental Intelligence Dashboard &bull; 2022&ndash;2024</p>
        </div>
        <div class="controls">
            <div class="pill">📍 Kerala, India</div>
            <div class="pill">
                🔽 <select id="cityFilter"><option value="All">All Cities</option></select>
            </div>
        </div>
    </div>

    <div class="stats-grid" id="statsGrid"></div>

    <div class="charts-grid">
        <div class="chart-card animate">
            <div class="chart-title">💨 Air Quality Index &mdash; Monthly</div>
            <div class="chart-wrap"><canvas id="aqiChart"></canvas></div>
        </div>
        <div class="chart-card animate">
            <div class="chart-title">💧 River BOD Levels (mg/L)</div>
            <div class="chart-wrap"><canvas id="bodChart"></canvas></div>
        </div>
    </div>

    <div class="table-card animate">
        <div class="chart-title">🏔️ Soil Contamination Registry</div>
        <div style="overflow-x:auto">
            <table>
                <thead><tr><th>District</th><th>Land Use</th><th>pH</th><th>Lead (mg/kg)</th><th>Cadmium</th><th>Chromium</th><th style="text-align:right">Status</th></tr></thead>
                <tbody id="soilTable"></tbody>
            </table>
        </div>
    </div>

    <footer>&copy; 2026 Environmental Analytics Division, Kerala &bull; Verified Systems</footer>
</div>

<script>
const D = window.POLLUTION_DATA;
let aqiChartInstance = null;

// Populate city filter
const sel = document.getElementById('cityFilter');
D.cities.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; sel.appendChild(o); });

function getFilteredAir() {
    const city = sel.value;
    return city === 'All' ? D.air : D.air.filter(d => d.City === city);
}

function renderStats() {
    const air = getFilteredAir();
    const avgAQI = Math.round(air.reduce((a,b) => a + b.AQI, 0) / air.length);
    const stats = [
        { label: 'Avg AQI Index', value: avgAQI, icon: '💨', color: '#3b82f6', trend: -4.2 },
        { label: 'Water Potability', value: D.summary.water_safe_percentage + '%', icon: '💧', color: '#10b981' },
        { label: 'Soil Toxicity Rate', value: D.summary.soil_contaminated_percentage + '%', icon: '🏔️', color: '#f59e0b', trend: 1.8 },
        { label: 'Monitoring Stations', value: D.districts.length + D.rivers.length, icon: '📊', color: '#8b5cf6' }
    ];
    const grid = document.getElementById('statsGrid');
    grid.innerHTML = stats.map(s => `
        <div class="stat-card animate" style="box-shadow:0 0 30px ${s.color}15">
            <div class="stat-top">
                <div>
                    <div class="stat-label">${s.label}</div>
                    <div class="stat-value">${s.value}</div>
                    ${s.trend !== undefined ? `<div class="stat-trend ${s.trend < 0 ? 'down' : 'up'}">${s.trend < 0 ? '↓' : '↑'} ${Math.abs(s.trend)}% vs last year</div>` : ''}
                </div>
                <div class="stat-icon" style="background:${s.color}15;font-size:1.5rem">${s.icon}</div>
            </div>
        </div>
    `).join('');
}

function renderAQIChart() {
    const air = getFilteredAir();
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const aqiData = months.map(m => {
        const rows = air.filter(d => d.Month === m);
        return rows.length ? Math.round(rows.reduce((a,b) => a + b.AQI, 0) / rows.length) : 0;
    });

    if (aqiChartInstance) aqiChartInstance.destroy();

    const ctx = document.getElementById('aqiChart').getContext('2d');
    const gradient = ctx.createLinearGradient(0, 0, 0, 320);
    gradient.addColorStop(0, 'rgba(59,130,246,0.3)');
    gradient.addColorStop(1, 'rgba(59,130,246,0)');

    aqiChartInstance = new Chart(ctx, {
        type: 'line',
        data: {
            labels: months,
            datasets: [{
                label: 'AQI',
                data: aqiData,
                borderColor: '#3b82f6',
                backgroundColor: gradient,
                borderWidth: 3,
                fill: true,
                tension: 0.4,
                pointRadius: 0,
                pointHoverRadius: 6,
                pointHoverBackgroundColor: '#3b82f6',
                pointHoverBorderColor: '#09090b',
                pointHoverBorderWidth: 3
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: '#18181b',
                    borderColor: 'rgba(255,255,255,0.1)',
                    borderWidth: 1,
                    titleColor: '#fafafa',
                    bodyColor: '#3b82f6',
                    bodyFont: { weight: 'bold' },
                    cornerRadius: 12,
                    padding: 12
                }
            },
            scales: {
                x: { grid: { display: false }, ticks: { color: '#71717a', font: { size: 12 } }, border: { display: false } },
                y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#71717a', font: { size: 12 } }, border: { display: false } }
            }
        }
    });
}

function renderBODChart() {
    const rivers = {};
    D.water.forEach(w => {
        if (!rivers[w.River]) rivers[w.River] = [];
        rivers[w.River].push(w);
    });
    const labels = Object.keys(rivers);
    const bods = labels.map(r => +(rivers[r].reduce((a,b) => a + b['BOD(mg/L)'], 0) / rivers[r].length).toFixed(1));
    const colors = bods.map(v => v > 16 ? '#ef4444' : v > 10 ? '#f59e0b' : '#10b981');

    const ctx = document.getElementById('bodChart').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'BOD (mg/L)',
                data: bods,
                backgroundColor: colors,
                borderRadius: 8,
                barThickness: 36
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: '#18181b',
                    borderColor: 'rgba(255,255,255,0.1)',
                    borderWidth: 1,
                    titleColor: '#fafafa',
                    bodyColor: '#10b981',
                    bodyFont: { weight: 'bold' },
                    cornerRadius: 12,
                    padding: 12
                }
            },
            scales: {
                x: { grid: { display: false }, ticks: { color: '#71717a', font: { size: 11 } }, border: { display: false } },
                y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#71717a', font: { size: 12 } }, border: { display: false } }
            }
        }
    });
}

function renderSoilTable() {
    const tbody = document.getElementById('soilTable');
    tbody.innerHTML = D.soil.slice(0, 10).map(r => {
        const cls = r.Soil_Quality_Class.includes('Heavily') ? 'tag-bad' : r.Soil_Quality_Class.includes('Moderately') ? 'tag-moderate' : 'tag-good';
        return `<tr>
            <td class="bold">${r.District}</td>
            <td style="color:#a1a1aa">${r.Land_Use}</td>
            <td class="mono text-green">${r.pH}</td>
            <td class="mono">${r['Lead(mg/kg)']}</td>
            <td class="mono">${r['Cadmium(mg/kg)']}</td>
            <td class="mono">${r['Chromium(mg/kg)']}</td>
            <td style="text-align:right"><span class="tag ${cls}">${r.Soil_Quality_Class}</span></td>
        </tr>`;
    }).join('');
}

// Initial render
renderStats();
renderAQIChart();
renderBODChart();
renderSoilTable();

// City filter change
sel.addEventListener('change', () => {
    renderStats();
    renderAQIChart();
});
</script>
</body>
</html>
